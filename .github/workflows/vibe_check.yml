name: Vibe Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  vibe-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Run Main Vibe
      run: |
        python src/main.py
    - name: Lint Vibes (Black)
      run: |
        pip install black
        black --check src/
